<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/main.css}" rel="stylesheet">
</head>
<body>

    <nav th:fragment="side-bar(activePage)" class="vici-sidebar d-flex flex-column">
        <div class="sidebar-section-label">Workspace</div>

        <a th:href="@{/}" th:classappend="${activePage == 'overview'} ? ' active'" class="sidebar-link">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="9" rx="1.5"/>
                <rect x="14" y="3" width="7" height="5" rx="1.5"/>
                <rect x="14" y="12" width="7" height="9" rx="1.5"/>
                <rect x="3" y="16" width="7" height="5" rx="1.5"/>
            </svg>
            Overview
        </a>

        <a th:href="@{/students}" th:classappend="${activePage == 'students'} ? ' active'" class="sidebar-link">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="8" r="3.2"/>
                <path d="M3.5 20a5.5 5.5 0 0 1 11 0"/>
                <path d="M16 6.2a3 3 0 0 1 0 5.6"/>
                <path d="M17.5 14.4A5.2 5.2 0 0 1 21 19.4"/>
            </svg>
            Students
        </a>

        <a th:href="@{/api/notion/tutors}" th:classappend="${activePage == 'tutors'} ? ' active'" class="sidebar-link">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="7.5" r="3.2"/>
                <path d="M5 20a7 7 0 0 1 14 0"/>
                <path d="M8.5 13.5h7"/>
            </svg>
            Tutors
        </a>

        <a th:href="@{/bookings}" th:classappend="${activePage == 'bookings'} ? ' active'" class="sidebar-link">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3.5" y="4.5" width="17" height="16" rx="2.5"/>
                <path d="M3.5 9h17"/>
                <path d="M8 2.5v4M16 2.5v4"/>
            </svg>
            Bookings
        </a>

        <a th:href="@{/associations}" th:classappend="${activePage == 'associations'} ? ' active'" class="sidebar-link">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="7" cy="8" r="2.6"/>
                <circle cx="17" cy="8" r="2.6"/>
                <path d="M2.5 19a4.5 4.5 0 0 1 9 0"/>
                <path d="M12.5 19a4.5 4.5 0 0 1 9 0"/>
                <path d="M9.6 8h4.8"/>
            </svg>
            Associations
        </a>


        <!-- Admin-only tools: hidden from tutors (they also can't reach the routes). -->
        <a sec:authorize="hasRole('ADMIN')" th:href="@{/comms/review}" th:classappend="${activePage == 'comms-review'} ? ' active'" class="sidebar-link">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3.2v2.3M12 18.5v2.3M4.6 7.5l2 1.2M17.4 14.3l2 1.2M4.6 16.5l2-1.2M17.4 9.7l2-1.2"/>
                <circle cx="12" cy="12" r="3.4"/>
            </svg>
            Automations
        </a>

        <a sec:authorize="hasRole('ADMIN')" th:href="@{/sync}" th:classappend="${activePage == 'sync'} ? ' active'" class="sidebar-link">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3.5 12a8.5 8.5 0 0 1 14.5-6"/>
                <path d="M20.5 12a8.5 8.5 0 0 1-14.5 6"/>
                <path d="M18.2 2.5v3.6h-3.6"/>
                <path d="M5.8 21.5v-3.6h3.6"/>
            </svg>
            Sync Status
        </a>

        <div class="mt-auto pt-3">
            <div th:if="${activePage == 'overview'}" class="sidebar-stats-card">
                <div class="week-label">
                    <span class="week-dot"></span>
                    This Week
                </div>
                <!-- TODO wire this up to real booking count -->
                <div class="big-num">92</div>
                <div class="num-label">sessions booked</div>
            </div>

            <div th:if="${activePage == 'tutors'}" class="sidebar-stats-card">
                <div class="week-label">
                    <span class="week-dot"></span>
                    Notion
                </div>
                <div class="big-num" th:text="${#lists.size(tutors)}">0</div>
                <div class="num-label">tutors loaded</div>
            </div>
        </div>
    </nav>
</body>
</html>
