<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vici Learning — Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/main.css}" rel="stylesheet">
    <style>
        /* Registration page styles — kept inline to mirror the login card. */

        .login-page {
            min-height: 100vh;
            background: var(--vici-bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            border: 1px solid var(--vici-border);
            border-radius: 16px;
            padding: 36px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 24px rgba(21, 49, 92, 0.07);
        }

        .login-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .login-brand-icon {
            width: 38px;
            height: 38px;
            background: var(--vici-navy-dark);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--vici-gold);
            font-family: 'Fraunces', serif;
            font-size: 18px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .login-brand-name {
            font-family: 'Fraunces', serif;
            font-size: 17px;
            font-weight: 700;
            color: var(--vici-text);
        }

        .login-brand-sub {
            font-size: 11px;
            color: var(--vici-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .login-heading {
            font-family: 'Fraunces', serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--vici-text);
            margin-bottom: 4px;
        }

        .login-sub {
            font-size: 13px;
            color: var(--vici-muted);
            margin-bottom: 28px;
        }

        .login-label {
            font-size: 11.5px;
            font-weight: 700;
            color: var(--vici-text);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
            display: block;
        }

        .login-input {
            width: 100%;
            height: 42px;
            border: 1.5px solid var(--vici-border);
            border-radius: 9px;
            padding: 0 13px;
            font-size: 14px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--vici-text);
            background: #fdfcf9;
            outline: none;
            transition: border-color 0.15s;
            margin-bottom: 16px;
        }

        .login-input:focus {
            border-color: var(--vici-navy);
            background: white;
            box-shadow: 0 0 0 3px rgba(21, 49, 92, 0.08);
        }

        .login-btn {
            width: 100%;
            height: 44px;
            background: var(--vici-navy);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Plus Jakarta Sans', sans-serif;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 4px;
        }

        .login-btn:hover {
            background: #1a4a3a;
        }

        .login-alert {
            border-radius: 9px;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 18px;
        }

        .login-alert-error {
            background: var(--vici-red-bg);
            color: var(--vici-red);
            border: 1px solid #f0c4bb;
        }

        .login-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: var(--vici-muted);
        }

        .login-footer a {
            color: var(--vici-navy);
            font-weight: 700;
            text-decoration: none;
        }

        .login-card-accent {
            height: 4px;
            background: linear-gradient(90deg, #2a7a52, #3a9e6a);
            border-radius: 16px 16px 0 0;
            margin: -36px -40px 32px;
        }
    </style>
</head>
<body>

<div class="login-page">
    <div class="login-card">
        <div class="login-card-accent"></div>
        <div class="login-brand">
            <div class="login-brand-icon">V</div>
            <div>
                <div class="login-brand-name">Vici Learning</div>
                <div class="login-brand-sub">Staff Console</div>
            </div>
        </div>
        <div class="login-heading">Create an account</div>
        <div class="login-sub">Register for staff access to the dashboard</div>

        <!-- validation / duplicate-username error -->
        <div class="login-alert login-alert-error" th:if="${error}" th:text="${error}">
            Something went wrong.
        </div>

        <form th:action="@{/register}" method="post">
            <label class="login-label" for="username">Username</label>
            <input class="login-input" type="text" id="username" name="username"
                   th:value="${username}" placeholder="Choose a username" autofocus required/>

            <!-- Added a verification code section that requires new account 
            to submit to confirm what permissions they will and for security purpoes-->
            <!-- TO BE REVIEWED-->
            <label class="login-label" for="verificationCode">Verification Code</label>
            <input class="login-input" type="text" id="verificationCode" name="verificationCode"
                   th:value="${username}" placeholder="Enter Verification Code" autofocus required/>

            <label class="login-label" for="password">Password</label>
            <input class="login-input" type="password" id="password" name="password"
                   placeholder="At least 8 characters" required/>

            <label class="login-label" for="confirmPassword">Confirm password</label>
            <input class="login-input" type="password" id="confirmPassword" name="confirmPassword"
                   placeholder="Re-enter password" required/>

            <button type="submit" class="login-btn">Create Account</button>
        </form>

        <div class="login-footer">
            Already have an account? <a th:href="@{/login}">Sign in</a>
        </div>

        

    </div>
</div>

</body>
</html>
