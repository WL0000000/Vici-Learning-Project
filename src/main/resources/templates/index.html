<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vici Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/main.css}" rel="stylesheet">
</head>
<body>

<nav class="vici-nav">
    <div class="container d-flex align-items-center justify-content-between">
        <span class="brand">Vici Learning</span>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn-ghost">Log out</button>
        </form>
    </div>
</nav>

<main class="container py-5">
    <div class="mb-4">
        <h1 class="h4 mb-1">Dashboard</h1>
        <span class="status-pill">Scaffold running</span>
    </div>

    <hr class="vici-divider">

    <div class="vici-card">
        <p class="text-muted mb-0">
            Booking metrics and action items will appear here in later phases.
        </p>
    </div>
</main>

</body>
</html>
