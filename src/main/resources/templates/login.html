<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Vici Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .login-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-base);
        }

        .login-box {
            width: 100%;
            max-width: 380px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 2.5rem 2rem;
        }

        .login-brand {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-pri);
            letter-spacing: -0.01em;
            margin-bottom: 0.25rem;
        }

        .login-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .login-box label {
            display: block;
            font-size: 0.78rem;
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.4rem;
        }

        .login-box input {
            width: 100%;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 2px;
            color: var(--text-pri);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            padding: 0.6rem 0.75rem;
            outline: none;
            transition: border-color 0.15s;
            margin-bottom: 1.25rem;
        }

        .login-box input:focus {
            border-color: var(--accent);
        }

        .login-box input::placeholder {
            color: var(--text-muted);
        }

        .btn-primary {
            width: 100%;
            background: var(--accent);
            border: none;
            border-radius: 2px;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 0.88rem;
            letter-spacing: 0.02em;
            padding: 0.65rem;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 0.25rem;
        }

        .btn-primary:hover {
            background: var(--accent-dim);
        }

        .alert {
            font-size: 0.82rem;
            padding: 0.6rem 0.75rem;
            border-radius: 2px;
            margin-bottom: 1.25rem;
        }

        .alert-danger {
            background: rgba(224, 82, 82, 0.12);
            border: 1px solid rgba(224, 82, 82, 0.35);
            color: var(--danger);
        }

        .alert-success {
            background: rgba(61, 184, 122, 0.1);
            border: 1px solid rgba(61, 184, 122, 0.3);
            color: var(--success);
        }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-box">
        <div class="login-brand">Vici Dashboard</div>
        <div class="login-subtitle">Staff access only</div>

        <div th:if="${param.error}" class="alert alert-danger">
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            You have been logged out.
        </div>

        <form th:action="@{/login}" method="post">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" required autofocus placeholder="Enter username">

            <label for="password">Password</label>
            <input id="password" name="password" type="password" required placeholder="Enter password">

            <button type="submit" class="btn-primary">Sign in</button>
        </form>
    </div>
</div>
</body>
</html>
