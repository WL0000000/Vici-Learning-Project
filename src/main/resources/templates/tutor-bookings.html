<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookings — Tutor Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/main.css}" rel="stylesheet">

    <style>
        .tutor-week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .week-day-col { background: var(--vici-card); border: 1px solid var(--vici-border); border-radius: 10px; min-height: 260px; padding: 10px; }
        .week-day-col.is-today { border-color: var(--vici-navy); box-shadow: 0 0 0 1px var(--vici-navy) inset; }
        .week-day-header { text-align: center; padding-bottom: 8px; border-bottom: 1px solid var(--vici-border); margin-bottom: 8px; }
        .week-day-name { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--vici-muted); font-weight: 600; }
        .week-day-num { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; color: var(--vici-text); }
        .week-day-col.is-today .week-day-num { color: var(--vici-navy); }
        .week-session-card {
            background: var(--vici-bg);
            border-radius: 8px;
            padding: 8px 10px;
            margin-bottom: 8px;
            font-size: 12.5px;
            cursor: pointer;
            transition: background .12s ease, transform .12s ease;
        }
        .week-session-card:hover {
            background: #efe8d8;
            transform: translateY(-1px);
        }
        .week-session-time { font-weight: 700; color: var(--vici-navy); font-size: 12px; }
        .week-session-student { font-weight: 600; margin-top: 2px; }
        .week-session-service { color: var(--vici-muted); font-size: 11.5px; margin-top: 1px; }
        .week-empty-day { color: var(--vici-muted); font-size: 12px; text-align: center; padding-top: 40px; }
        @media (max-width: 900px) { .tutor-week-grid { grid-template-columns: repeat(2, 1fr); } }

        /* session detail modal */
        .session-modal-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--vici-navy);
            color: var(--vici-gold);
            font-family: 'Fraunces', serif;
            font-weight: 700;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .session-modal-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--vici-border);
            font-size: 13.5px;
        }
        .session-modal-row:last-child { border-bottom: none; }
        .session-modal-label { color: var(--vici-muted); }
        .session-modal-value { font-weight: 600; color: var(--vici-text); }
    </style>
</head>
<body>
<div th:replace="~{fragments/tutor-header :: tutor-header('My Bookings', 'Your sessions this week')}"></div>

<div class="vici-layout">

    <script th:replace = "fragments/tutor-side-bar :: tutor-side-bar('tutor-bookings')"></script>

    <main class="vici-main">

        <div class="vici-panel mb-3" style="padding:14px 22px;">
            <div class="text-muted" style="font-size:13px;">
                To book or reschedule a session, use SimplyBookMe as usual. This calendar is for viewing only.
            </div>
        </div>

        <div class="vici-panel">
            <div class="vici-panel-header">
                <div>
                    <h2>This Week's Schedule</h2>
                    <p th:text="${weekRangeLabel}">This week</p>
                </div>
            </div>

            <div class="tutor-week-grid" style="padding: 4px 18px 18px;">
                <div th:each="day : ${weekDays}" class="week-day-col" th:classappend="${day.isToday} ? ' is-today'">
                    <div class="week-day-header">
                        <div class="week-day-name" th:text="${day.dayLabel}">MON</div>
                        <div class="week-day-num" th:text="${day.dateNum}">1</div>
                    </div>

                    <!-- clicking a session pulls its info out of data attributes and fills the modal, no server round trip needed for this placeholder version -->
                    <div th:each="s : ${day.sessions}" class="week-session-card"
                         data-bs-toggle="modal" data-bs-target="#sessionDetailModal"
                         th:attr="data-student=${s.studentName}, data-service=${s.serviceName}, data-status=${s.status},
                                   data-date=${#temporals.format(s.startTime, 'EEEE, MMM d')}, data-time=${#temporals.format(s.startTime, 'h:mm a')}">
                        <div class="week-session-time" th:text="${#temporals.format(s.startTime, 'h:mm a')}">—</div>
                        <div class="week-session-student" th:text="${s.studentName}">—</div>
                        <div class="week-session-service" th:text="${s.serviceName}">—</div>
                    </div>

                    <div th:if="${#lists.isEmpty(day.sessions)}" class="week-empty-day">No sessions</div>
                </div>
            </div>
        </div>

    </main>
</div>

<!-- session detail modal, populated via JS from the clicked card's data attributes -->
<div class="modal fade" id="sessionDetailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 14px; border: none;">
            <div class="modal-body" style="padding: 22px;">
                <div class="d-flex align-items-center gap-3 mb-2">
                    <div class="session-modal-avatar" id="modalAvatar">?</div>
                    <div>
                        <div style="font-family:'Fraunces',serif; font-weight:600; font-size:18px;" id="modalStudentName">—</div>
                        <span class="status-pill" id="modalStatusPill">—</span>
                    </div>
                </div>

                <div class="session-modal-row">
                    <span class="session-modal-label">Session</span>
                    <span class="session-modal-value" id="modalService">—</span>
                </div>
                <div class="session-modal-row">
                    <span class="session-modal-label">Date</span>
                    <span class="session-modal-value" id="modalDate">—</span>
                </div>
                <div class="session-modal-row">
                    <span class="session-modal-label">Time</span>
                    <span class="session-modal-value" id="modalTime">—</span>
                </div>

                <!-- placeholder for now, notes/history/etc can go here later -->
                <div class="text-muted" style="font-size:12px; margin-top:14px;">
                    More session details (notes, history) coming soon.
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // fills the modal from whichever session card was clicked, kept as plain JS since
    // there's nothing dynamic enough here yet to warrant a server round trip
    document.getElementById('sessionDetailModal').addEventListener('show.bs.modal', function (event) {
        var card = event.relatedTarget;
        var student = card.getAttribute('data-student');
        var service = card.getAttribute('data-service');
        var status = card.getAttribute('data-status');
        var date = card.getAttribute('data-date');
        var time = card.getAttribute('data-time');

        document.getElementById('modalAvatar').textContent = student.charAt(0);
        document.getElementById('modalStudentName').textContent = student;
        document.getElementById('modalService').textContent = service;
        document.getElementById('modalDate').textContent = date;
        document.getElementById('modalTime').textContent = time;

        var pill = document.getElementById('modalStatusPill');
        pill.textContent = status;
        pill.className = 'status-pill ' +
            (status === 'CONFIRMED' ? 'pill-confirmed' : status === 'PENDING' ? 'pill-pending' : 'pill-cancelled');
    });
</script>
</body>
</html>
