spring.application.name=vici-dashboard
server.port=${PORT:8080}

# ─── PostgreSQL (start first: docker compose up -d) ───────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME:vici_dashboard}
spring.datasource.username=${DB_USERNAME:vici}
spring.datasource.password=${DB_PASSWORD:vici}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.thymeleaf.cache=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ─── Admin login ──────────────────────────────────────────────────────────────
# The real admin account is created in the database by AdminUserSeeder using these
# same ADMIN_USERNAME/ADMIN_PASSWORD values (defaults: Admin / ViciLearning2026).
# The spring.security.user.* properties below are inert now that a DB-backed
# UserDetailsService (AppUserService) exists, but are kept aligned to avoid confusion.
spring.security.user.name=${ADMIN_USERNAME:Admin}
spring.security.user.password=${ADMIN_PASSWORD:ViciLearning2026}
spring.security.user.roles=ADMIN

# ─── SimplyBook.me sandbox ────────────────────────────────────────────────────
simplybook.company-login=${SIMPLYBOOK_COMPANY_LOGIN:}
simplybook.api-key=${SIMPLYBOOK_API_KEY:}
simplybook.admin-username=${SIMPLYBOOK_ADMIN_USERNAME:}
simplybook.admin-password=${SIMPLYBOOK_ADMIN_PASSWORD:}
simplybook.login-url=https://user-api.simplybook.me/login
simplybook.admin-url=https://user-api.simplybook.me/admin
simplybook.sync-interval-ms=3600000
# REST API v2 — for custom client fields (Account_ID), memberships, invoices
simplybook.api-v2-url=https://user-api-v2.simplybook.me
simplybook.api-user-key=${SIMPLYBOOK_API_USER_KEY:}
simplybook.account-id-field-title=${SIMPLYBOOK_ACCOUNT_ID_FIELD:Account_ID}

# ─── Notion tutors data source ────────────────────────────────────────────────
notion.token=${NOTION_TOKEN:}
notion.tutors-data-source-id=${NOTION_TUTORS_DATA_SOURCE_ID:382afcd2-0bd4-8009-8a38-000b6a333b18}
notion.tutors-database-id=${NOTION_TUTORS_DATABASE_ID:}
notion.api-base-url=https://api.notion.com

# ─── Brevo Sandbox ────────────────────────────────────────────────────────────
brevo.api.url=${BREVO_API_URL:https://api.brevo.com/v3}
brevo.api.key=${BREVO_API_KEY:}
