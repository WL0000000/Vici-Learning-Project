name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://vici-learning-project.onrender.com
    steps:
      - name: Trigger Render deploy
        run: curl -fsSL "${{ secrets.RENDER_DEPLOY_HOOK }}"
